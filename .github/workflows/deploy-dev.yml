name: Deploy to dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Read server IP
        id: ip
        run: echo "ip=$(cat infra/environments/dev/server_ip)" >> $GITHUB_OUTPUT

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/axiomgarden_dev_ed25519
          chmod 600 ~/.ssh/axiomgarden_dev_ed25519
          ssh-keyscan -H ${{ steps.ip.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build Docker image
        run: docker build -t axiomgarden:dev .

      - name: Transfer image to server
        run: |
          docker save axiomgarden:dev | gzip | ssh \
            -i ~/.ssh/axiomgarden_dev_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@${{ steps.ip.outputs.ip }} \
            "gunzip | docker load"

      - name: Update .env on server
        run: |
          ssh \
            -i ~/.ssh/axiomgarden_dev_ed25519 \
            -o StrictHostKeyChecking=no \
            root@${{ steps.ip.outputs.ip }} \
            "sed -i 's|^NEXTAUTH_URL=|AUTH_URL=|' /opt/axiomgarden/.env || true"

      - name: Sync docker-compose.yml
        run: |
          scp \
            -i ~/.ssh/axiomgarden_dev_ed25519 \
            -o StrictHostKeyChecking=no \
            docker-compose.yml \
            root@${{ steps.ip.outputs.ip }}:/opt/axiomgarden/docker-compose.yml

      - name: Restart containers
        run: |
          ssh \
            -i ~/.ssh/axiomgarden_dev_ed25519 \
            -o StrictHostKeyChecking=no \
            root@${{ steps.ip.outputs.ip }} \
            "cd /opt/axiomgarden && docker compose up -d --remove-orphans 2>&1"
