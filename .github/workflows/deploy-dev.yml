name: Deploy to dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Read server IP
        id: ip
        run: echo "ip=$(cat infra/environments/dev/server_ip)" >> $GITHUB_OUTPUT

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/axiomgarden_dev_ed25519
          chmod 600 ~/.ssh/axiomgarden_dev_ed25519
          ssh-keyscan -H ${{ steps.ip.outputs.ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build Docker image
        run: docker build -t axiomgarden:dev .

      - name: Transfer image to server
        run: |
          docker save axiomgarden:dev | gzip | ssh \
            -i ~/.ssh/axiomgarden_dev_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@${{ steps.ip.outputs.ip }} \
            "gunzip | docker load"

      - name: Install Ansible
        run: pip install ansible --quiet

      - name: Write Ansible inventory
        run: |
          cat > ansible/inventory/dev.ini << EOF
          [axiomgarden]
          ${{ steps.ip.outputs.ip }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/axiomgarden_dev_ed25519

          [axiomgarden:vars]
          environment=dev
          domain=dev.axiomgarden.xyz
          litestream_bucket=axiomgarden-dev-db
          litestream_endpoint=${{ secrets.DEV_LITESTREAM_ENDPOINT }}
          litestream_access_key=${{ secrets.DEV_LITESTREAM_ACCESS_KEY }}
          litestream_secret_key=${{ secrets.DEV_LITESTREAM_SECRET_KEY }}
          auth_secret=${{ secrets.DEV_AUTH_SECRET }}
          EOF

      - name: Run Ansible playbook
        run: ansible-playbook -i ansible/inventory/dev.ini ansible/deploy.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
