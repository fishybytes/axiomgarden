services:
  restore:
    image: litestream/litestream:0.3
    entrypoint: ["/bin/sh", "-c"]
    command: "[ -f /data/axiomgarden.db ] || litestream restore -if-replica-exists /data/axiomgarden.db"
    volumes:
      - db_data:/data
      - /opt/axiomgarden/litestream.yml:/etc/litestream.yml:ro
    restart: "no"
  app:
    image: axiomgarden:dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - db_data:/app/data
    env_file:
      - .env
    depends_on:
      restore:
        condition: service_completed_successfully
  replicate:
    image: litestream/litestream:0.3
    volumes:
      - db_data:/data
      - /opt/axiomgarden/litestream.yml:/etc/litestream.yml:ro
    command: replicate
    restart: unless-stopped
    depends_on:
      restore:
        condition: service_completed_successfully
volumes:
  db_data:
